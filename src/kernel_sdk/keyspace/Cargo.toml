[package]
name = "tezos-smart-rollup-keyspace"
version = "0.0.0"
edition = "2021"
license = "MIT"
publish = false

[features]
default = ["irmin-compat"]
irmin-compat = []

[dependencies]
thiserror.workspace = true

[dependencies.tezos-smart-rollup-constants]
path = "../constants"
default-features = false

[dependencies.tezos-smart-rollup-core]
path = "../core"
default-features = false

[dependencies.tezos-smart-rollup-host]
path = "../host"
default-features = false

[build-dependencies.tezos-smart-rollup-build-utils]
path = "../build-utils"

[dev-dependencies.tezos-smart-rollup-mock]
path = "../mock"
