  stage: publishing_tests
  tags:
  - gcp
  rules:
  - changes:
    - docs/introduction/install-bin-deb.sh
    - manifest/**/*.ml*
    - scripts/ci/build-debian-packages.sh
    - scripts/ci/build-debian-packages_current.sh
    - scripts/ci/build-keyring-deb.sh
    - scripts/ci/create_debian_repo.sh
    - scripts/ci/prepare-apt-repo.sh
    - scripts/packaging/Release.conf
    - scripts/packaging/build-deb-local.sh
    - scripts/packaging/octez-archive-keyring/**/*
    - scripts/packaging/octez/debian/*
    - scripts/packaging/tests/deb/test-keyring*
    - scripts/version.sh
    when: on_success
  needs:
  - apt_repo_debian
  dependencies: []
  timeout: 60 minutes
  interruptible: false
  before_script:
  - SCRIPT_STEP_BEGIN=$(date +%s)
  - . ./scripts/ci/datadog_send_job_info.sh
  - . ./scripts/ci/datadog_send_job_cache_info.sh 'before'
  script:
  - ./scripts/ci/docker_initialize.sh
  - ./scripts/ci/systemd-packages-test.sh scripts/packaging/tests/deb/test-keyring.sh
    images/packages/debian-systemd-tests.Dockerfile
  - . ./scripts/ci/datadog_send_job_script_step_time.sh || true
  after_script:
  - . ./scripts/ci/datadog_send_job_cache_info.sh 'after'
  services:
  - docker:28.5.1-dind@sha256:ea9d20492ca1caaaba78e68453433895d256173c79281756e88b745647fcbcfd
  variables:
    DEP_IMAGE: ${GCP_PROTECTED_REGISTRY}/tezos/tezos/debian-systemd:trixie-master-25648bf0
    DISTRIBUTION: debian
    DOCKER_VERSION: 28.5.1
    PREFIX: ""
    RELEASE: trixie

oc.unit:non-proto-arm64:
  image: ${ci_image_name}/test:${ci_image_tag}
  stage: test
  tags:
  - gcp_arm64
  rules:
  - changes:
    - .gitlab-ci.yml
    - .gitlab/ci/pipelines/before_merging.yml
    - .gitlab/ci/pipelines/merge_train.yml
    - Makefile
    - brassaia-eio/**/*
    - brassaia/**/*
    - data-encoding/**/*
    - dune
    - dune-project
    - dune-workspace
    - etherlink/**/*
    - irmin/**/*
    - lwt_domain/**/*
    - michelson_test_scripts/**/*
    - opam/**/*
    - prometheus/**/*
    - resto/**/*
    - rust-toolchain
    - script-inputs/**/*
    - scripts/**/*
    - sdk/**/*
    - src/**/*
    - tezt/**/*
    - tzt_reference_test_suite/**/*
    when: on_success
  needs:
  - oc.docker:ci:arm64
  - oc.build_kernels
  dependencies:
  - oc.docker:ci:arm64
  - oc.build_kernels
  timeout: 20 minutes
  cache:
    key: cargo-$CI_JOB_NAME_SLUG
    paths:
    - $CI_PROJECT_DIR/.cargo/registry/cache
    - $CI_PROJECT_DIR/.cargo/registry/index
    - $CI_PROJECT_DIR/.cargo/registry/src
    policy: pull-push
  interruptible: true
  before_script:
  - SCRIPT_STEP_BEGIN=$(date +%s)
  - . ./scripts/ci/datadog_send_job_info.sh
  - . ./scripts/ci/datadog_send_job_cache_info.sh 'before'
  - . ./scripts/ci/sccache-start.sh
  script:
  - . ./scripts/version.sh
  - eval $(opam env)
  - make test-nonproto-unit test-webassembly
  - . ./scripts/ci/datadog_send_job_script_step_time.sh || true
  after_script:
  - . ./scripts/ci/datadog_send_job_cache_info.sh 'after'
  - ./scripts/ci/sccache-stop.sh
  variables:
    CARGO_INCREMENTAL: "0"
    CARGO_NET_OFFLINE: "false"
    DISTRIBUTE_TESTS_TO_PARALLELS: "true"
    DUNE_ARGS: -j 12
    SCCACHE_GCS_BUCKET: $GCP_SCCACHE_BUCKET
    SCCACHE_GCS_KEY_PREFIX: sccache
    SCCACHE_GCS_RW_MODE: READ_ONLY
    SCCACHE_IDLE_TIMEOUT: "0"
    SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
  artifacts:
    name: $CI_JOB_NAME-$CI_COMMIT_SHA-arm64
    expire_in: 1 day
    paths:
    - test_results
    reports:
      junit: test_results/*.xml
    when: always
  retry: 2
  parallel: 2

