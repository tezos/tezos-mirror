  after_script:
  - . ./scripts/ci/datadog_send_job_cache_info.sh 'after'
  variables:
    JUNIT: tezt-junit.xml
    TESTS: /ci_disabled && /time_sensitive && /slow && /extra && /cloud && /flaky
    TEZT_NO_NPX: "true"
    TEZT_PARALLEL: "3"
    TEZT_RETRY: "1"
    TEZT_VARIANT: ""
  artifacts:
    expire_in: 7 days
    paths:
    - selected_tezts.tsv
    - tezt.log
    - tezt-*.log
    - tezt-results.json
    - $JUNIT
    reports:
      junit: $JUNIT
    when: always
  retry: 2
  parallel: 36

