APT::FTPArchive::Release::Origin "Octez";
APT::FTPArchive::Release::Label "Octez Debian Repository";
APT::FTPArchive::Release::Components "main";
APT::FTPArchive::Release::Description "Debian Repository for Octez";
# Advertise by-hash support so apt clients fetch the package indices from
# immutable, content-addressed paths (dists/.../by-hash/<HASH>/<sum>) instead
# of the mutable Packages[.gz] path. This avoids the "File has unexpected size
# / Mirror sync in progress" error that occurs when a concurrent publish
# overwrites an index in place while a client is still reading the previous
# Release file.
APT::FTPArchive::Release::Acquire-By-Hash "yes";
